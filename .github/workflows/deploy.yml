name: CI/CD Pipeline - SolveMate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===========================
  # Job 1: Lint & Test
  # ===========================
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test
        env:
          NODE_ENV: test

  # ===========================
  # Job 2: Build Docker Image
  # ===========================
  docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: docker build -t solvemate:${{ github.sha }} .

      - name: 🏥 Test Docker health check
        run: |
          docker run -d --name solvemate-test \
            -p 3000:3000 \
            -e DB_PATH="mongodb://localhost:27017/test" \
            -e SESSION_SECRET="test-secret" \
            -e NODE_ENV=test \
            solvemate:${{ github.sha }} || true
          sleep 5
          docker logs solvemate-test || true
          docker stop solvemate-test || true
          docker rm solvemate-test || true

  # ===========================
  # Job 3: Deploy to Render
  # ===========================
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 🚀 Trigger Render Deploy
        run: |
          echo "✅ Render auto-deploys from GitHub on push to main."
          echo "📡 Deployment URL: https://solvemate-lzfl.onrender.com"
          echo "🏥 Health check: https://solvemate-lzfl.onrender.com/health"
